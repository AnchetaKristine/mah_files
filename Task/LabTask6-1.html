<head>

<style>

    .p1 input{
        display: block;
        width: 300px;

        color: rgb(95, 94, 94);

    }

    .p1 input:hover{
        background-color: rgb(245, 245, 245);

    #second{
        float: left;

        height: 100px;

    }

    .button{
        display: inline-block;
        width: 50px;
        height: 25px;
        border: 1px solid;
        border-radius: 4px;
        text-align: center;
        background-color: rgb(221, 218, 218);
        cursor: pointer;
    }

    .button:hover{
        background-color: rgb(228, 225, 225);
    }

    #third{
        clear: both;
        text-align: center;
        margin-top: 10;
        }

    img{
        width: 70%;
    }

    .p3 input{
        display: block;
        margin:auto;

        height: 20px;
        border: 1px solid gray;
        border-radius: 10px;
    }


        .P1 input{
        display:inline-block;
        margin-top: 20px;
        width: 204px;
        height: 20px;
        padding: 3px;
        border: 1px solid;
        border-radius: 3px;
        color: rgb(95, 94, 94);
        border-color: rgb(95, 94, 94);
    }

    .P2 input{
        display:block;
        width: 420px;

        border-radius: 3px;

    }

    .P1 input:hover, .P2 input:hover{
        background-color:rgb(245, 245, 245)
    }

    .sign:hover{
        background-color:#1563c9;
    }

    .sign{
        display: block;
        width: 428px;
        height: 30px;
        text-align: center;
        font-family:sans-serif;
        color: white;

        border-radius: 4px;

        cursor: pointer;
    }

    #Sec2{
        width: fit-content;
        height: fit-content;
        margin: 0;
    }

    .P3 input{
        display:block;
        margin-top: 8px;
        width: 300px;
        height: 30px;
        padding: 9px;
        border: none;
        border-radius: 3px;
        color: rgb(95, 94, 94);
        background-color: rgb(235, 235, 235);
    }
    
    .P4, .P5{
        display:inline-block;
        text-align: center;
        margin-top: 8px;
        height: 40px;

        border-radius: 3px;
        cursor: pointer;
        padding: 14px;

    .P4{background-color: rgb(0, 0, 0); color: white;}
    .P5{ margin-left:10px; rgb(235, 235, 235); color: black;}

    .P4:hover{background-color:rgb(21, 21, 21);}
    .P5:hover{background-color:rgb(209, 209, 209);}

    fieldset{
        width: fit-content;
        margin-top: 20px;
        border-radius: 10px;

<div>

    </div>

<div id="Sec1">

</div>
</fieldset>

<fieldset>
<div id="Sec2">
    <h1 style="font-family:Verdana, Geneva, Tahoma, sans-serif;">Request a ride now</h1>

    <p class="P3"><input type="text" placeholder="Enter pickup location"></p>
    <p class="P3"><input type="text" placeholder="Enter destination"></p>

    <button class="P4" type="submit">Request now</button>
    <button class="P5" type="submit">Schedule for later</button>

</div>
