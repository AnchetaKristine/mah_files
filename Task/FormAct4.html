<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <h1><font color="orange">How can we help?</font></h1>
    <fieldset>
    <legend><font color="indigo">Request for Proposal</font> </legend>
    <form>
        <table>
        <tr>
            <td><label>Your name:</label></td>
            <td><input type="text" size="20"></td>
        </tr>

        <tr>
            <td><label>Email:</label></td>
            <td><input type="email" size="20"></td>
        </tr>

        <tr>
            <td><label>Username: </label></td>
            <td><input type="text" size="20"></td>
        </tr>

        <tr>
            <td><label>Password: </label></td>
            <td><input type="password" size="20"></td>
        </tr>

        </table>

        <table>
        <tr>
            <td><label>Your Business: </label></td>
            <td><textarea placeholder="Briefly describe your business in this space"></textarea></td>
        </tr>

        </table>

        <table>
            <tr><label>Company size:</label></tr>
            <tr><input type="radio" name="Company size" value="Less than 10">
            <label>Less than 10</label>
            </tr>

            <tr>
            <td width="75"></td>
            <td><input type="radio" name="Company size" value="11 to 50">
            <label>11 to 50</label></td>
            </tr>

            <tr>
                <td width="75"></td>
                <td><input type="radio" name="Company size" value="50 to 200">
                <label>50 to 200</label></td>
            </tr>

            <tr>
                <td width="75"></td>
                <td><input type="radio" name="Company size" value="Over 200">
                <label>Over 200</label></td>
            </tr>

        </table>

        <table>
            <tr>
                <td><label">Service:</label></td>
                <td width="29"></td>
                <td><input type="checkbox" name="Brand Identity" value="Brand Identity"></td>
                <td><label>Brand Identity</label></td>
                
                <td><input type="checkbox" name="New Website" value="New Website"></td>
                <td><label>New Website</label></td>

                <td><input type="checkbox" name="Web Redisigner" value="Web Redisigner"></td>
                <td><label>Web Redisigner</label></td>

            </tr>
        </table>

        <table>
            <tr>
                <td><label>Timeline:</label></td>
                <td width="25"></td>
                <td><select name="Timeline"> 
                    <option>&nbsp;</option>
                    <option>Immediately</option>
                    <option>1-2 weeks</option>
                    <option>3-2 weeks</option>
                    <option>7-2 months</option>
                    </optgroup></td>
            </tr>
        </table>

        <table>
        <td width = "80"></td>
        <td><button type="submit">Send to dev/design</button></td>
        </table>


        

    </form>

    </fieldset>



</body>
</html>
